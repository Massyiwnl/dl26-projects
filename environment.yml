name: dl-project
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8  # Modificare a seconda del target (cluster DMI: verifica versione driver)
  - pip:
      - numpy
      - pandas
      - matplotlib
      - scikit-learn
      - pyyaml
      - tensorboard
      - tqdm
      - lmdb         # lettura feature TSM pre-estratte di Assembly101
      - seaborn      # confusion matrix e t-SNE leggibili
      - pillow       # IO immagini, dipendenza implicita di torchvision